<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">◈</div>
        <h1>Minha Plataforma</h1>
      </div>

      <div id="alert-box" class="alert hidden"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" placeholder="Digite seu usuário" autocomplete="username" />
          <span class="field-error" id="error-username"></span>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Digite sua senha" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar senha">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="error-password"></span>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkmark"></span>
            Lembrar de mim
          </label>
        </div>

        <button type="submit" class="btn-primary" id="btn-login">
          <span id="btn-text">Entrar</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <p class="footer-text">Não tem conta? <a href="register.html">Cadastre-se</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
